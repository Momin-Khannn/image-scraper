name: Process Public Scrape Request

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  public-scrape:
    if: contains(github.event.issue.title, '[Scrape Request]') || contains(github.event.issue.labels.*.name, 'scrape-request')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Parse request
        id: request
        run: image-scraper-request --event-path "$GITHUB_EVENT_PATH" --output-json request.json --github-output "$GITHUB_OUTPUT"

      - name: Run scraper
        id: scrape
        continue-on-error: true
        run: |
          mkdir -p output
          args=("${{ steps.request.outputs.target_url }}" --output-dir output --max-images "${{ steps.request.outputs.max_images }}")
          if [ "${{ steps.request.outputs.all_shopify_images }}" = "true" ]; then
            args+=(--all-shopify-images)
          fi
          image-scraper "${args[@]}"

      - name: Upload scraped images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-request-${{ github.event.issue.number }}
          path: output/
          retention-days: 14
          if-no-files-found: warn

      - name: Restore previous public site
        run: |
          mkdir -p site
          git fetch origin gh-pages --depth=1 || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git archive origin/gh-pages | tar -x -C site
          fi

      - name: Build public gallery
        run: |
          image-scraper-gallery \
            --docs-dir docs \
            --output-dir output \
            --site-dir site \
            --preserve-site \
            --gallery-subdir "${{ steps.request.outputs.gallery_subdir }}"

      - name: Persist public site branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf pages-branch
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add pages-branch origin/gh-pages
          else
            git worktree add --detach pages-branch
            cd pages-branch
            git checkout --orphan gh-pages
            cd ..
          fi
          find pages-branch -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a site/. pages-branch/
          cd pages-branch
          git add -A
          git commit -m "Publish scrape request ${ISSUE_NUMBER}" || exit 0
          git push origin HEAD:gh-pages

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy latest gallery to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment with public result
        uses: actions/github-script@v7
        env:
          GALLERY_URL: ${{ steps.deployment.outputs.page_url }}requests/issue-${{ github.event.issue.number }}/
          LATEST_URL: ${{ steps.deployment.outputs.page_url }}latest/
          SCRAPE_OUTCOME: ${{ steps.scrape.outcome }}
        with:
          script: |
            const status = process.env.SCRAPE_OUTCOME === 'success'
              ? 'The scrape finished successfully.'
              : 'The scrape finished with warnings or no downloaded images.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${status}\n\nPublic result: ${process.env.GALLERY_URL}\nLatest gallery: ${process.env.LATEST_URL}\n\nThe downloadable artifact is attached to this workflow run for 14 days.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

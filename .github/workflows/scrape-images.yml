name: Scrape Images

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Website URL to scrape"
        required: true
        type: string
      max_images:
        description: "Maximum number of image candidates to download"
        required: false
        default: "200"
        type: string
      all_shopify_images:
        description: "Download every Shopify product image instead of only the first image per product"
        required: false
        type: boolean
        default: false
      image_selection:
        description: "Image selection pattern (e.g. 1-5, 9-)"
        required: false
        type: string
        default: ""
      webhook_url:
        description: "Webhook URL to send results to"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run Image Scraper
        id: scrape
        run: |
          ARGS="--output-dir ${{ runner.temp }}/scraped-images --max-images ${{ inputs.max_images || 200 }}"
          if [ "${{ inputs.all_shopify_images }}" == "true" ]; then
            ARGS="$ARGS --all-shopify-images"
          fi
          if [ -n "${{ inputs.image_selection }}" ]; then
            ARGS="$ARGS --image-selection '${{ inputs.image_selection }}'"
          fi
          if [ -n "${{ inputs.webhook_url }}" ]; then
            ARGS="$ARGS --webhook-url '${{ inputs.webhook_url }}'"
          fi
          image-scraper "${{ inputs.target_url }}" $ARGS

      - name: Upload scraped images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraped-images-${{ github.run_number }}
          path: output/
          retention-days: 14
          if-no-files-found: warn

      - name: Restore previous public site
        run: |
          mkdir -p site
          git fetch origin gh-pages --depth=1 || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git archive origin/gh-pages | tar -x -C site
          fi

      - name: Build public gallery
        run: image-scraper-gallery --docs-dir docs --output-dir output --site-dir site --preserve-site --gallery-subdir manual/run-${{ github.run_number }}

      - name: Persist public site branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf pages-branch
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add pages-branch origin/gh-pages
          else
            git worktree add --detach pages-branch
            cd pages-branch
            git checkout --orphan gh-pages
            cd ..
          fi
          find pages-branch -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a site/. pages-branch/
          cd pages-branch
          git add -A
          git commit -m "Publish manual scrape run ${{ github.run_number }}" || exit 0
          git push origin HEAD:gh-pages

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy latest gallery to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

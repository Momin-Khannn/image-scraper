name: Scrape Images

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Website URL to scrape"
        required: true
        type: string
      max_images:
        description: "Maximum number of image candidates to download"
        required: false
        default: "200"
        type: string
      all_shopify_images:
        description: "Download every Shopify product image instead of only the first image per product"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run scraper
        env:
          TARGET_URL: ${{ inputs.target_url }}
          MAX_IMAGES: ${{ inputs.max_images }}
          ALL_SHOPIFY_IMAGES: ${{ inputs.all_shopify_images }}
        run: |
          mkdir -p output
          args=("$TARGET_URL" --output-dir output --max-images "$MAX_IMAGES")
          if [ "$ALL_SHOPIFY_IMAGES" = "true" ]; then
            args+=(--all-shopify-images)
          fi
          image-scraper "${args[@]}"

      - name: Upload scraped images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraped-images-${{ github.run_number }}
          path: output/
          retention-days: 14
          if-no-files-found: warn

      - name: Build public gallery
        run: image-scraper-gallery --docs-dir docs --output-dir output --site-dir site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy latest gallery to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Latest Scrape Gallery</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #18202a;
        background: #f8fafc;
        letter-spacing: 0;
      }

      main {
        width: min(680px, 100%);
        padding: 28px;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 3.6rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        color: #617083;
        line-height: 1.6;
      }

      a {
        color: #0f766e;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Latest Scrape Gallery</h1>
      <p>No public scrape has been published yet. Create a scrape request from the <a href="../">project page</a> after deploying the repository to GitHub.</p>
    </main>
  </body>
</html>
